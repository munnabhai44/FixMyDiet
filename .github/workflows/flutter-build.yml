name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Create Flutter Platform Folders (if missing)
        run: |
          if [ ! -d "android" ]; then
            echo "Android folder missing, running flutter create..."
            flutter create --project-name fix_my_diet --org com.antigravity .
          fi

      - name: Sync Package Name with Firebase
        run: |
          if [ -f "google-services.json" ]; then
            echo "Found google-services.json in root."
            
            # Extract the actual package name from your Firebase JSON
            PKG_NAME=$(grep -o '"package_name": "[^"]*' google-services.json | head -1 | cut -d'"' -f4)
            echo "Your Firebase package name is: $PKG_NAME"
            
            if [ ! -z "$PKG_NAME" ]; then
              # Replace our default package name with YOUR Firebase package name everywhere in the Android code
              find android -type f -exec sed -i "s/com.antigravity.fix_my_diet/$PKG_NAME/g" {} +
              echo "Successfully synced Android package name!"
            fi
            
            # Move it to the correct folder for building
            mv google-services.json android/app/google-services.json
          else
            echo "Warning: google-services.json not found in the root directory!"
          fi

      - name: Add Firebase and Google Services Plugins to build.gradle
        run: |
          if grep -q "com.google.gms.google-services" android/app/build.gradle; then
             echo "Already added."
          else
             sed -i 's/id "com.android.application"/id "com.android.application"\n    id "com.google.gms.google-services"/' android/app/build.gradle
             sed -i 's/dependencies {/dependencies {\n    implementation platform("com.google.firebase:firebase-bom:32.7.0")/' android/app/build.gradle
          fi
          
          if grep -q "google-services" android/settings.gradle; then
            echo "Already in settings"
          else
             sed -i 's/plugins {/plugins {\n    id "com.google.gms.google-services" version "4.4.0" apply false/' android/settings.gradle
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixMyDiet-APK
          path: build/app/outputs/flutter-apk/app-release.apk
