name: fix_my_diet
description: AI-powered dietician & Ayurvedic consultant for Indian users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: any
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  google_sign_in: ^6.2.1
  http: any
  google_generative_ai: any

  shared_preferences: any
  google_fonts: any
  url_launcher: any
  uuid: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: any

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
